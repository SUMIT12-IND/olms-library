{% extends "base.html" %}
{% block title %}Edit Book{% endblock %}
{% block page_title %}Edit Book{% endblock %}

{% block content %}
<div class="card form-card">
    <form method="POST" class="styled-form" id="edit-book-form">
        <div class="form-row">
            <div class="form-group">
                <label for="title">Book Title</label>
                <input type="text" id="title" name="title" value="{{ book.title }}" required>
            </div>
            <div class="form-group">
                <label for="author">Author</label>
                <input type="text" id="author" name="author" value="{{ book.author }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" value="{{ book.category }}" required>
            </div>
            <div class="form-group">
                <label for="isbn">ISBN</label>
                <input type="text" id="isbn" name="isbn" value="{{ book.isbn }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" value="{{ book.quantity }}" min="1" required>
            </div>
            <div class="form-group">
                <p class="form-hint">Currently available: <strong>{{ book.available_quantity }}</strong></p>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Book</button>
            <a href="{{ url_for('admin.books') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
