{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <span class="auth-icon">📝</span>
        <h1>Create Account</h1>
        <p>Join the library community</p>
    </div>
    <form method="POST" class="auth-form" id="register-form">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" value="{{ name|default('') }}" required
                minlength="2">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" value="{{ email|default('') }}"
                required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required
                minlength="6">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password"
                required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="register-btn">Create Account</button>
    </form>
    <div class="auth-footer">
        <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
    </div>
</div>
{% endblock %}
