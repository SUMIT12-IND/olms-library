databases:
  - name: olms-db
    plan: free
    databaseName: olms_db

services:
  - type: web
    name: olms-library
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: olms-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
